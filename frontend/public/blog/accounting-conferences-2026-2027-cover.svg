<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none" role="img" aria-label="Accounting conferences 2026 to 2027 global calendar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <pattern id="dots" width="15" height="15" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#F5F0E8" opacity="0.06"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#083344" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#dots)"/>

  <!-- Eyebrow -->
  <text x="84" y="168" fill="#F5F0E8" opacity="0.7" font-family="Inter, system-ui, sans-serif"
        font-size="24" font-weight="600" letter-spacing="6">— GLOBAL CALENDAR</text>

  <!-- Headline -->
  <text x="80" y="312" fill="#F5F0E8" font-family="Inter, system-ui, sans-serif"
        font-size="92" font-weight="700" letter-spacing="-2">Accounting</text>
  <text x="80" y="416" fill="#F5F0E8" font-family="Inter, system-ui, sans-serif"
        font-size="92" font-weight="700" letter-spacing="-2">conferences<tspan fill="#FDE68A">.</tspan></text>

  <!-- Year pill -->
  <g transform="translate(84 470)">
    <rect width="232" height="56" rx="28" fill="#FDE68A"/>
    <text x="116" y="37" fill="#0E7490" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="30" font-weight="700" letter-spacing="1">2026 – 2027</text>
  </g>

  <text x="86" y="588" fill="#F5F0E8" opacity="0.6" font-family="Inter, system-ui, sans-serif"
        font-size="24" font-weight="500">Dates, locations &amp; focus — worldwide, from today forward</text>

  <!-- Calendar card motif -->
  <g filter="url(#soft)" transform="translate(880 176)">
    <rect width="316" height="368" rx="22" fill="#F5F0E8"/>
    <rect x="0" y="0" width="316" height="72" rx="22" fill="#0E7490"/>
    <rect x="0" y="50" width="316" height="22" fill="#0E7490"/>
    <circle cx="66" cy="16" r="7" fill="#F5F0E8"/><rect x="62" y="4" width="8" height="20" rx="4" fill="#F5F0E8"/>
    <circle cx="250" cy="16" r="7" fill="#F5F0E8"/><rect x="246" y="4" width="8" height="20" rx="4" fill="#F5F0E8"/>
    <text x="158" y="48" fill="#F5F0E8" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="2">2026</text>
    <!-- grid -->
    <g fill="#0A0A0A" opacity="0.12">
      <g transform="translate(28 104)">
        <rect x="0" y="0" width="34" height="34" rx="7"/><rect x="46" y="0" width="34" height="34" rx="7"/><rect x="92" y="0" width="34" height="34" rx="7"/><rect x="138" y="0" width="34" height="34" rx="7"/><rect x="184" y="0" width="34" height="34" rx="7"/><rect x="230" y="0" width="34" height="34" rx="7"/>
        <rect x="0" y="46" width="34" height="34" rx="7"/><rect x="46" y="46" width="34" height="34" rx="7"/><rect x="92" y="46" width="34" height="34" rx="7"/><rect x="184" y="46" width="34" height="34" rx="7"/><rect x="230" y="46" width="34" height="34" rx="7"/>
        <rect x="0" y="92" width="34" height="34" rx="7"/><rect x="46" y="92" width="34" height="34" rx="7"/><rect x="138" y="92" width="34" height="34" rx="7"/><rect x="184" y="92" width="34" height="34" rx="7"/><rect x="230" y="92" width="34" height="34" rx="7"/>
        <rect x="0" y="138" width="34" height="34" rx="7"/><rect x="92" y="138" width="34" height="34" rx="7"/><rect x="138" y="138" width="34" height="34" rx="7"/><rect x="230" y="138" width="34" height="34" rx="7"/>
      </g>
    </g>
    <!-- highlighted dates -->
    <g fill="#0891B2">
      <rect x="120" y="150" width="34" height="34" rx="7"/>
      <rect x="212" y="196" width="34" height="34" rx="7"/>
      <rect x="74" y="242" width="34" height="34" rx="7"/>
    </g>
  </g>
</svg>
