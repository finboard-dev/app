<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="Multi-entity month-end close in five days">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#F5F0E8" opacity="0.06"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#3B0A6E" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Eyebrow -->
  <text x="80" y="150" fill="#F5F0E8" opacity="0.7" font-family="Inter, system-ui, sans-serif"
        font-size="24" font-weight="600" letter-spacing="6">— MONTH-END CLOSE</text>

  <!-- Headline -->
  <text x="76" y="286" fill="#F5F0E8" font-family="Inter, system-ui, sans-serif"
        font-size="82" font-weight="700" letter-spacing="-2">Close the books</text>
  <text x="76" y="386" fill="#F5F0E8" font-family="Inter, system-ui, sans-serif"
        font-size="82" font-weight="700" letter-spacing="-2">in <tspan fill="#FDE68A" font-style="italic">5 days</tspan>.</text>
  <rect x="150" y="402" width="196" height="8" rx="4" fill="#FDE68A" opacity="0.85"/>

  <!-- Byline -->
  <text x="80" y="500" fill="#F5F0E8" opacity="0.6" font-family="Inter, system-ui, sans-serif"
        font-size="24" font-weight="500">A FinBoard playbook for multi-entity groups</text>

  <!-- Checklist card motif -->
  <g filter="url(#soft)" transform="translate(792 150)">
    <rect width="326" height="330" rx="20" fill="#F5F0E8"/>
    <rect x="0" y="0" width="326" height="60" rx="20" fill="#EDE9FE"/>
    <rect x="0" y="40" width="326" height="20" fill="#EDE9FE"/>
    <circle cx="34" cy="30" r="8" fill="#7C3AED"/>
    <rect x="54" y="24" width="150" height="12" rx="6" fill="#7C3AED" opacity="0.55"/>
    <text x="270" y="38" fill="#7C3AED" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700">D-5</text>

    <!-- rows -->
    <g font-family="Inter, system-ui, sans-serif">
      <!-- row 1 done -->
      <circle cx="42" cy="108" r="15" fill="#7C3AED"/>
      <path d="M35 108 l5 6 l10 -12" stroke="#F5F0E8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="72" y="101" width="196" height="14" rx="7" fill="#0A0A0A" opacity="0.14"/>
      <!-- row 2 done -->
      <circle cx="42" cy="158" r="15" fill="#7C3AED"/>
      <path d="M35 158 l5 6 l10 -12" stroke="#F5F0E8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="72" y="151" width="168" height="14" rx="7" fill="#0A0A0A" opacity="0.14"/>
      <!-- row 3 done -->
      <circle cx="42" cy="208" r="15" fill="#7C3AED"/>
      <path d="M35 208 l5 6 l10 -12" stroke="#F5F0E8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="72" y="201" width="184" height="14" rx="7" fill="#0A0A0A" opacity="0.14"/>
      <!-- row 4 pending -->
      <circle cx="42" cy="258" r="14" fill="none" stroke="#7C3AED" stroke-width="3" opacity="0.5"/>
      <rect x="72" y="251" width="150" height="14" rx="7" fill="#0A0A0A" opacity="0.09"/>
    </g>
  </g>
</svg>
